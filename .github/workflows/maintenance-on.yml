name: Enable Maintenance Mode

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment; cancel any in-progress run so maintenance takes effect immediately.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  set-maintenance-variable:
    name: Persist maintenance mode (ON)
    runs-on: ubuntu-latest
    steps:
      - name: Set repository maintenance variable
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner
            const repo = context.repo.repo
            const name = 'MAINTENANCE_MODE'
            const value = 'true'

            try {
              await github.request('PATCH /repos/{owner}/{repo}/actions/variables/{name}', {
                owner,
                repo,
                name,
                value
              })
              core.info(`Updated ${name}=${value}`)
            } catch (error) {
              if (error.status !== 404) throw error
              await github.request('POST /repos/{owner}/{repo}/actions/variables', {
                owner,
                repo,
                name,
                value
              })
              core.info(`Created ${name}=${value}`)
            }

  build:
    name: Build VitePress site (maintenance ON)
    needs: set-maintenance-variable
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build VitePress (maintenance mode enabled)
        working-directory: website
        env:
          VITE_PKA2XML_API_URL: ${{ vars.PKA2XML_API_URL }}
          VITE_MAINTENANCE_MODE: 'true'
        run: npm run docs:build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/.vitepress/dist

  deploy:
    name: Deploy to GitHub Pages (maintenance ON)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
