name: Disable Maintenance Mode

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment; cancel any in-progress run so the site restores immediately.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build VitePress site (maintenance OFF)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build VitePress (maintenance mode disabled)
        working-directory: website
        env:
          VITE_PKA2XML_API_URL: ${{ vars.PKA2XML_API_URL }}
          VITE_MAINTENANCE_MODE: 'false'
        run: npm run docs:build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/.vitepress/dist

  deploy:
    name: Deploy to GitHub Pages (maintenance OFF)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
