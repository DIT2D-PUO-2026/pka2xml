name: Deploy VitePress to GitHub Pages

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'website/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment; queue new runs until the current one finishes.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build VitePress site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for lastUpdated in VitePress

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Resolve maintenance mode
        id: maintenance_mode
        env:
          REPO_MAINTENANCE_MODE: ${{ vars.MAINTENANCE_MODE }}
          PAGES_STATE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/maintenance-state.json
        run: |
          set -euo pipefail

          mode="${REPO_MAINTENANCE_MODE:-}"

          if [[ "$mode" != "true" && "$mode" != "false" ]]; then
            state="$(curl -fsSL "$PAGES_STATE_URL" 2>/dev/null || true)"
            if [[ -n "$state" ]]; then
              parsed="$(printf '%s' "$state" | sed -nE 's/.*"enabled"[[:space:]]*:[[:space:]]*(true|false).*/\1/p' | head -n1)"
              if [[ "$parsed" == "true" || "$parsed" == "false" ]]; then
                mode="$parsed"
              fi
            fi
          fi

          if [[ "$mode" != "true" ]]; then
            mode="false"
          fi

          echo "value=$mode" >> "$GITHUB_OUTPUT"
          echo "Using maintenance mode: $mode"

      - name: Write maintenance state file
        run: |
          mkdir -p website/public
          cat > website/public/maintenance-state.json <<JSON
          {"enabled":${{ steps.maintenance_mode.outputs.value }}}
          JSON

      - name: Build VitePress
        working-directory: website
        env:
          VITE_PKA2XML_API_URL: ${{ vars.PKA2XML_API_URL }}
          VITE_MAINTENANCE_MODE: ${{ steps.maintenance_mode.outputs.value }}
        run: npm run docs:build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/.vitepress/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
